# Routarr — docker-compose.yml
# https://github.com/black7spades/routarr
#
# Quick start:
#   docker compose up -d
#
# Then open http://localhost:6942 and complete setup in Settings.
# All values below can also be entered through the Settings UI.

services:
  routarr:
    image: ghcr.io/black7spades/routarr:latest
    # To build from source instead:
    # build: .
    container_name: routarr
    restart: unless-stopped
    ports:
      - "6942:6942"
    volumes:
      - routarr-data:/data
    environment:
      # Required
      - TUNARR_URL=          # e.g. http://192.168.1.10:8000

      # Media sources — fill in whichever you use (at least one required)

      # Plex
      - PLEX_URL=            # e.g. http://192.168.1.10:32400
      - PLEX_TOKEN=          # your Plex auth token

      # Jellyfin
      - JELLYFIN_URL=        # e.g. http://192.168.1.10:8096
      - JELLYFIN_API_KEY=    # your Jellyfin API key

      # Optional
      - PLEX_SOURCE_ID=      # auto-detected if blank

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6942/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  routarr-data:
    # To use a bind mount instead of a named volume, replace the above with:
    # driver: local
    # And add to the service:
    #   volumes:
    #     - /your/path/routarr/data:/data
