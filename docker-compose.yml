# Routarr — docker-compose.yml
# https://github.com/black7spades/routarr
#
# Quick start:
#   docker compose up -d
#
# Then open http://localhost:6942 and complete setup in Settings.
# Credentials can also be pre-filled via the environment variables below.

services:
  routarr:
    image: black7spades/routarr:latest
    # To build from source instead:
    # build: .
    container_name: routarr
    restart: unless-stopped
    ports:
      - "6942:6942"
    volumes:
      - routarr-data:/data
    environment:
      # Optional — pre-fill settings on first start.
      # All values can also be entered through the Settings UI.
      - PLEX_URL=            # e.g. http://192.168.1.10:32400
      - PLEX_TOKEN=          # Your Plex authentication token
      - TUNARR_URL=          # e.g. http://192.168.1.10:8000
      - JELLYFIN_URL=        # e.g. http://192.168.1.10:8096  (optional)
      - JELLYFIN_API_KEY=    # Your Jellyfin API key           (optional)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6942/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  routarr-data:
    # To use a bind mount instead of a named volume, replace the above with:
    # driver: local
    # And add to the service:
    #   volumes:
    #     - /your/path/routarr/data:/data
